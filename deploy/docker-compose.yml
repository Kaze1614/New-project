services:
  mysql:
    image: mysql:8.4
    container_name: math-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-math_ai}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: math-ai-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-math_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: math-ai-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-18000}:80"

volumes:
  mysql_data:
